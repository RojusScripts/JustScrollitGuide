<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustScrollit User Guide</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container"></div>
        <button class="lang-toggle" id="langToggle">Switch to Spanish</button>
    </header>

    <div class="container">
        <nav id="sidebar">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search guide..." autocomplete="off" spellcheck="false">
            </div>
            <ul id="navLinks"></ul>
        </nav>

        <main id="content">
            <div id="hero">
                <img id="heroLogo" class="hero-logo" alt="JustScrollit Logo">
                <p id="mainSubtitle" style="color: var(--accent-color); font-weight: 600;"></p>
                <p id="mainAuthor" style="font-size: 0.9rem;"></p>
            </div>
            <div id="sectionsContainer"></div>
        </main>
    </div>

    <script src="guide_content.js"></script>
    <script>
        let currentLang = 'en';

        const elements = {
            heroLogo: document.getElementById('heroLogo'),
            mainSubtitle: document.getElementById('mainSubtitle'),
            mainAuthor: document.getElementById('mainAuthor'),
            sectionsContainer: document.getElementById('sectionsContainer'),
            navLinks: document.getElementById('navLinks'),
            langToggle: document.getElementById('langToggle'),
            searchInput: document.getElementById('searchInput')
        };

        function createImage(src, size) {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'img-container';
            if (size) imgDiv.classList.add(`size-${size}`);
            
            const img = document.createElement('img');
            img.src = `images/${src}`;
            imgDiv.appendChild(img);
            return imgDiv;
        }

        function renderGuide(lang) {
            const data = guideContent[lang];
            
            // Logo Integration
            const logoPath = `images/JUSTSCROLLIT LOGO HEADER_00000.png`;
            document.querySelector('.logo-container').innerHTML = `<img src="${logoPath}" class="logo-img">`;
            elements.heroLogo.src = logoPath;

            elements.mainSubtitle.innerText = data.subtitle;
            elements.mainAuthor.innerText = data.author;
            elements.langToggle.innerText = lang === 'en' ? 'Español' : 'English';

            // Reset
            elements.sectionsContainer.innerHTML = '';
            elements.navLinks.innerHTML = '';

            data.sections.forEach(section => {
                // Sidebar Link
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${section.id}`;
                a.innerText = section.title;
                li.appendChild(a);
                elements.navLinks.appendChild(li);

                // Section Content
                const sec = document.createElement('section');
                sec.id = section.id;
                
                const h2 = document.createElement('h2');
                h2.innerText = section.title;
                sec.appendChild(h2);

                // Image after title?
                if (section.image && (!section.imagePosition || section.imagePosition === 'after-title')) {
                    sec.appendChild(createImage(section.image, section.imageSize));
                }

                // Split content into paragraphs to allow mid-section images
                const paragraphs = section.content.split('\n\n');
                paragraphs.forEach((text, idx) => {
                    const p = document.createElement('p');
                    p.innerHTML = text;
                    sec.appendChild(p);

                    // Check for mid-content images (e.g. after 2nd paragraph in 3.2)
                    if (section.midImages) {
                        section.midImages.forEach(m => {
                            if (m.afterParagraph === (idx + 1)) {
                                sec.appendChild(createImage(m.src, m.size));
                            }
                        });
                    }
                });

                if (section.image && section.imagePosition === 'after-content') {
                    sec.appendChild(createImage(section.image, section.imageSize));
                }

                if (section.subsections) {
                    section.subsections.forEach(sub => {
                        const subDiv = document.createElement('div');
                        subDiv.style.marginTop = '2rem';
                        
                        const h3 = document.createElement('h3');
                        h3.innerText = sub.title;
                        subDiv.appendChild(h3);

                        if (sub.image) {
                            subDiv.appendChild(createImage(sub.image, sub.imageSize));
                        }
                        
                        // Support midImages in subsections
                        const subParagraphs = sub.content.split('\n\n');
                        subParagraphs.forEach((text, idx) => {
                            const p = document.createElement('p');
                            p.innerHTML = text;
                            subDiv.appendChild(p);

                            if (sub.midImages) {
                                sub.midImages.forEach(m => {
                                    if (m.afterParagraph === (idx + 1)) {
                                        subDiv.appendChild(createImage(m.src, m.size));
                                    }
                                });
                            }
                        });

                        sec.appendChild(subDiv);
                    });
                }

                elements.sectionsContainer.appendChild(sec);
            });

            observeSections();
        }

        elements.langToggle.onclick = () => {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            elements.searchInput.value = ''; // clear search when switching lang
            renderGuide(currentLang);
            window.scrollTo(0, 0);
        };

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightSearch(query) {
            // Remove previous highlights
            const marks = document.querySelectorAll('mark.search-highlight');
            marks.forEach(mark => {
                const parent = mark.parentNode;
                parent.replaceChild(document.createTextNode(mark.textContent), mark);
                parent.normalize();
            });

            if (!query) return;

            const regex = new RegExp(`(${escapeRegExp(query)})`, 'gi');
            
            // Text nodes walker
            const walker = document.createTreeWalker(
                elements.sectionsContainer,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );

            let node;
            const nodesToReplace = [];
            while ((node = walker.nextNode())) {
                if (node.nodeValue.trim() !== '' && regex.test(node.nodeValue)) {
                    nodesToReplace.push(node);
                }
            }

            let firstMatch = null;
            nodesToReplace.forEach(n => {
                const fragment = document.createDocumentFragment();
                let lastIndex = 0;
                let match;
                regex.lastIndex = 0; // reset
                while ((match = regex.exec(n.nodeValue)) !== null) {
                    if (match.index > lastIndex) {
                        fragment.appendChild(document.createTextNode(n.nodeValue.substring(lastIndex, match.index)));
                    }
                    const mark = document.createElement('mark');
                    mark.className = 'search-highlight';
                    mark.textContent = match[0];
                    if (!firstMatch) firstMatch = mark;
                    fragment.appendChild(mark);
                    lastIndex = regex.lastIndex;
                }
                if (lastIndex < n.nodeValue.length) {
                    fragment.appendChild(document.createTextNode(n.nodeValue.substring(lastIndex)));
                }
                n.parentNode.replaceChild(fragment, n);
            });

            if (firstMatch) {
                // Remove smooth to avoid annoying jumps on fast typing
                firstMatch.scrollIntoView({ behavior: 'auto', block: 'center' });
            }
        }

        elements.searchInput.addEventListener('input', (e) => {
            highlightSearch(e.target.value.trim());
        });

        function observeSections() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('section').forEach(section => {
                observer.observe(section);
            });
        }

        renderGuide('en');
    </script>
</body>
</html>
